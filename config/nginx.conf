# Configuração Nginx para Gerador de QR Code
# Salve em: /etc/nginx/sites-available/qrcode

server {
    listen 80;
    server_name seu-dominio.com www.seu-dominio.com;  # AJUSTE AQUI

    root /var/www/gerador-qrcode;
    index index.html;

    # Logs
    access_log /var/log/nginx/qrcode-access.log;
    error_log /var/log/nginx/qrcode-error.log;

    # Servir interface web
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache para arquivos estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Segurança - esconder arquivos Python
    location ~ \.(py|pyc|sh)$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}

